<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid E-Commerce - Toko Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #222;
            font-size: 2.5rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.4s ease;
        }

        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .product-image {
            position: relative;
            height: 260px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.08);
        }

        .sale-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #e74c3c;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .product-info {
            padding: 18px;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #222;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 1.35rem;
            font-weight: 700;
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .old-price {
            font-size: 0.95rem;
            color: #999;
            text-decoration: line-through;
            margin-left: 8px;
        }

        .product-rating {
            color: #f1c40f;
            margin-bottom: 12px;
        }

        .add-to-cart {
            width: 100%;
            padding: 14px;
            background: #222;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-to-cart:hover {
            background: #e74c3c;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .grid-container {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <h1>Produk Terlaris</h1>

    <div class="grid-container">
        
        <!-- Product 1 -->
        <div class="product-card">
            <div class="product-image">
                <span class="sale-badge">SALE</span>
                <img src="sepatunike.jpg" alt="Sepatu Nike">
            </div>
            <div class="product-info">
                <h3 class="product-title">Nike Air Force 1 White</h3>
                <div>
                    <span class="product-price">Rp 1.299.000</span>
                    <span class="old-price">Rp 1.599.000</span>
                </div>
                <div class="product-rating">★★★★☆ (128)</div>
                <button class="add-to-cart">Tambah ke Keranjang</button>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="product-card">
            <div class="product-image">
                <img src="https://via.placeholder.com/400x300/4ECDC4/ffffff?text=Headphone" alt="Headphone">
            </div>
            <div class="product-info">
                <h3 class="product-title">Sony WH-1000XM5 Wireless</h3>
                <div>
                    <span class="product-price">Rp 5.499.000</span>
                </div>
                <div class="product-rating">★★★★★ (342)</div>
                <button class="add-to-cart">Tambah ke Keranjang</button>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="product-card">
            <div class="product-image">
                <span class="sale-badge">-30%</span>
                <img src="https://via.placeholder.com/400x300/45B7D1/ffffff?text=Smartwatch" alt="Smartwatch">
            </div>
            <div class="product-info">
                <h3 class="product-title">Apple Watch Series 9</h3>
                <div>
                    <span class="product-price">Rp 6.299.000</span>
                    <span class="old-price">Rp 8.999.000</span>
                </div>
                <div class="product-rating">★★★★☆ (89)</div>
                <button class="add-to-cart">Tambah ke Keranjang</button>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="product-card">
            <div class="product-image">
                <img src="https://via.placeholder.com/400x300/96CEB4/ffffff?text=Tas" alt="Tas">
            </div>
            <div class="product-info">
                <h3 class="product-title">Herschel Little America Backpack</h3>
                <div>
                    <span class="product-price">Rp 899.000</span>
                </div>
                <div class="product-rating">★★★★☆ (67)</div>
                <button class="add-to-cart">Tambah ke Keranjang</button>
            </div>
        </div>

        <!-- Tambahkan lebih banyak card sesuai kebutuhan -->
    </div>

</body>
</html>
